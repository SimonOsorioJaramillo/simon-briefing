name: Daily Pre-Market Briefing

on:
  schedule:
    # 11:00 UTC = 7:00 AM EDT / 6:00 AM EST (NY time).
    # GitHub Actions cron usa UTC sin DST. En invierno (EST) corre 1h antes,
    # pero sigue siendo pre-market (NYSE abre 9:30 AM ET).
    - cron: '0 11 * * *'
  workflow_dispatch:  # permite ejecución manual desde la UI

# Solo una corrida activa a la vez para evitar conflictos de push
concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necesario para hacer commit y push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_briefing.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.js
          if git diff --staged --quiet; then
            echo "Sin cambios — el briefing es idéntico al previo (raro pero posible)"
          else
            git commit -m "Daily briefing $(date -u +%Y-%m-%d)"
            git push
          fi
